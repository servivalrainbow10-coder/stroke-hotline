<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="脳卒中ホットライン">
<title>脳卒中ホットライン</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;background:#020817;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}
  input,select,textarea,button{font-family:inherit;}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:#0f172a}
  ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
  select option{background:#0f172a;}
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(0.4);}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

const EMS_UNITS = ["吹田","豊中","箕面","池田","摂津","茨木","高槻","大阪市","守口門真","その他"];

const LVO_ITEMS = [
  { key:"facial",    label:"顔面麻痺",    lateral:true  },
  { key:"motorArm",  label:"上肢麻痺",    lateral:true  },
  { key:"aphasia",   label:"失語",        lateral:false },
  { key:"gaze",      label:"共同偏視",    lateral:true  },
  { key:"neglect",   label:"半側空間無視", lateral:true  },
  { key:"irregular", label:"脈不整",      lateral:false },
];

const JCS_OPTIONS = [
  ["","未選択"],
  ["0","0（清明）"],
  ["1","Ⅰ-1"],["2","Ⅰ-2"],["3","Ⅰ-3"],
  ["10","Ⅱ-10"],["20","Ⅱ-20"],["30","Ⅱ-30"],
  ["100","Ⅲ-100"],["200","Ⅲ-200"],["300","Ⅲ-300"],
];

const INITIAL_LVO = {
  facial:null, motorArm:null, aphasia:false,
  gaze:null,   neglect:null,  irregular:false,
};

const INITIAL = {
  contactType:"ems", emsUnit:"", hospitalName:"", visitType:"",
  age:"", sex:"", chiefComplaint:"",
  sx_headache:false, sx_nausea:false, sx_seizure_resolved:false, sx_seizure_ongoing:false,
  onsetType:"clear", onsetTime:"", lastSeenNormal:"", foundTime:"",
  lvo:{...INITIAL_LVO},
  bpRightSys:"", bpRightDia:"", bpLeftSys:"", bpLeftDia:"", showBpLeft:false,
  hr:"", spo2:"", temp:"", jcs:"",
  pupilR:"3", pupilL:"3", lrR:null, lrL:null,
  stroke_hx:false, af:false, dm:false, ht:false,
  antithrombotics:"", otherMeds:"",
  arrivalMin:"", companion:null, companionNote:"", memo:"",
};

function useNow() {
  const [now, setNow] = useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),30000); return()=>clearInterval(t); },[]);
  return now;
}
function formatTime(val){ if(!val)return"不明"; return val.replace("T"," ").slice(0,16); }
function elapsedStr(from,now){
  if(!from)return null;
  const diff=now-new Date(from).getTime();
  if(diff<0)return null;
  const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
  return h>0?`${h}時間${m}分`:`${m}分`;
}
function calcLvoScore(lvo){ return LVO_ITEMS.filter(({key,lateral})=>lateral?lvo[key]!==null:lvo[key]===true).length; }
function lvoLines(lvo){
  const positives=LVO_ITEMS.map(({key,label,lateral})=>{
    if(lateral)return lvo[key]?`${label}（${lvo[key]}）`:null;
    return lvo[key]?label:null;
  }).filter(Boolean);
  const score=calcLvoScore(lvo);
  if(score===0)return"  スコア：0/6点（陽性なし）";
  return`  スコア：${score}/6点\n  陽性：${positives.join("・")}`;
}
function sxText(data){
  const list=[data.sx_headache&&"頭痛",data.sx_nausea&&"嘔気・嘔吐",data.sx_seizure_resolved&&"痙攣（止痙済）",data.sx_seizure_ongoing&&"痙攣（持続中）"].filter(Boolean);
  return list.length?list.join("・"):"なし";
}
function nextLvoVal(cur,lateral){
  if(!lateral)return cur?null:true;
  if(cur===null)return"右"; if(cur==="右")return"左"; return null;
}
function generateNotification(data,now){
  const contactLabel=data.contactType==="ems"?`🚑 救急隊：${data.emsUnit||"不明"}`:`🏥 紹介病院：${data.hospitalName||"不明"}`;
  const visitLabel=data.visitType==="new"?"初診":data.visitType==="return"?"再診":"不明";
  const pmhx=[data.stroke_hx&&"脳卒中既往",data.af&&"AF",data.dm&&"DM",data.ht&&"HT"].filter(Boolean).join("／")||"特記なし";
  const bpFmt=(sys,dia)=>(sys||dia)?`${sys||"?"}/${dia||"?"}`:null;
  const bpText=[bpFmt(data.bpRightSys,data.bpRightDia)&&`右 ${bpFmt(data.bpRightSys,data.bpRightDia)}`,bpFmt(data.bpLeftSys,data.bpLeftDia)&&`左 ${bpFmt(data.bpLeftSys,data.bpLeftDia)}`].filter(Boolean).join("　")||"?";
  const companionText=data.companion===true?`あり${data.companionNote?"（"+data.companionNote+"）":""}`:data.companion===false?"なし":"不明";
  const arrivalText=data.arrivalMin?`約${data.arrivalMin}分後（${new Date(now+data.arrivalMin*60000).toTimeString().slice(0,5)}頃）`:"未定";
  let timeBlock;
  if(data.onsetType==="clear"){
    const el=elapsedStr(data.onsetTime,now);
    timeBlock=`⏰ 発症時刻：${formatTime(data.onsetTime)}${el?` （${el}前）`:""}`;
  } else {
    const el=elapsedStr(data.lastSeenNormal,now);
    timeBlock=`🟢 最終健常確認：${formatTime(data.lastSeenNormal)}${el?` （${el}前）`:""}
⏰ 発見時刻：${formatTime(data.foundTime)}`;
  }
  const lrStr=v=>v===true?"＋":v===false?"－":"?";
  const pupilText=`右 ${data.pupilR||"?"}mm（LR${lrStr(data.lrR)}）　左 ${data.pupilL||"?"}mm（LR${lrStr(data.lrL)}）`;
  const rSys=parseInt(data.bpRightSys)||0, lSys=parseInt(data.bpLeftSys)||0, bpDiff=Math.abs(rSys-lSys);
  const aortaWarnReasons=[(rSys>0&&rSys<=110)&&`右収縮期 ${rSys}mmHg（≦110）`,(data.showBpLeft&&lSys>0&&rSys>0&&bpDiff>=20)&&`左右差 ${bpDiff}mmHg（≧20）`].filter(Boolean);
  const aortaBlock=aortaWarnReasons.length>0?`\n🚨【大動脈解離の疑い】${aortaWarnReasons.join("・")}`:"";
  return`🚨【脳卒中ホットライン】
━━━━━━━━━━━━━━
${contactLabel}
📋 患者：${data.age?data.age+"歳":"?"} ${data.sex||"?"}　${visitLabel}
💬 主訴：${data.chiefComplaint||"記載なし"}
🔸 随伴症状：${sxText(data)}
━━━━━━━━━━━━━━
${timeBlock}
━━━━━━━━━━━━━━
🧠 LVOスケール
${lvoLines(data.lvo)}
━━━━━━━━━━━━━━
📊 バイタル
  BP: ${bpText} mmHg
  HR: ${data.hr||"?"} bpm　SpO2: ${data.spo2||"?"}%　体温: ${data.temp||"?"}℃
  JCS: ${data.jcs||"?"}
  瞳孔：${pupilText}${aortaBlock}
━━━━━━━━━━━━━━
📂 既往：${pmhx}
💊 抗血栓薬：${data.antithrombotics||"なし"}
${data.otherMeds?"　その他内服："+data.otherMeds:""}
━━━━━━━━━━━━━━
🏁 病着予定：${arrivalText}
👥 同乗者：${companionText}
${data.memo?"📝 備考："+data.memo:""}
━━━━━━━━━━━━━━
${new Date(now).toLocaleString("ja-JP")}`;
}

// ── UI parts ──────────────────────────────
const S = (style) => style;
const Section=({title,accent,children})=>(
  <div style={{marginBottom:24}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,paddingBottom:8,borderBottom:`2px solid ${accent}33`}}>
      <div style={{width:3,height:18,background:accent,borderRadius:2}}/>
      <span style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:accent,textTransform:"uppercase"}}>{title}</span>
    </div>
    {children}
  </div>
);
const Field=({label,children})=>(
  <div style={{marginBottom:12}}>
    <label style={{display:"block",fontSize:11,color:"#64748b",marginBottom:5,fontWeight:600,letterSpacing:"0.06em"}}>{label}</label>
    {children}
  </div>
);
const inputStyle={width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontSize:14,outline:"none",boxSizing:"border-box"};
const Input=(props)=><input {...props} style={{...inputStyle,...(props.style||{})}}/>;
const SegControl=({value,onChange,options})=>(
  <div style={{display:"flex",background:"#0f172a",borderRadius:10,padding:4,border:"1px solid #1e293b"}}>
    {options.map(([v,l])=>(
      <button key={v} onClick={()=>onChange(v)} style={{flex:1,padding:"8px 4px",borderRadius:7,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,transition:"all 0.15s",background:value===v?"#1e40af":"transparent",color:value===v?"#93c5fd":"#475569"}}>{l}</button>
    ))}
  </div>
);
const Toggle=({label,checked,onChange,color="#3b82f6"})=>(
  <button onClick={()=>onChange(!checked)} style={{padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,transition:"all 0.15s",background:checked?color:"#1e293b",color:checked?"#fff":"#64748b"}}>{label}</button>
);
const BinaryBtn=({label,value,onChange})=>(
  <div style={{marginBottom:12}}>
    <div style={{fontSize:11,color:"#64748b",marginBottom:6,fontWeight:600,letterSpacing:"0.06em"}}>{label}</div>
    <div style={{display:"flex",gap:8}}>
      {[[true,"あり","#22c55e"],[false,"なし","#475569"]].map(([v,l,col])=>(
        <button key={String(v)} onClick={()=>onChange(value===v?null:v)} style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,transition:"all 0.15s",background:value===v?col:"#1e293b",color:value===v?"#fff":"#64748b"}}>{l}</button>
      ))}
    </div>
  </div>
);
const ElapsedBadge=({label,from,accent})=>{
  const now=useNow();
  if(!from)return null;
  const diff=now-new Date(from).getTime();
  if(diff<0)return null;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  const text=h>0?`${h}時間${m}分経過`:`${m}分経過`;
  const warn=diff>4.5*3600000;
  return(
    <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:6,padding:"5px 14px",borderRadius:20,background:warn?"#7f1d1d22":"#0f172a",border:`1px solid ${warn?"#ef444466":accent+"55"}`}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:warn?"#ef4444":accent,animation:"pulse 1.5s infinite"}}/>
      <span style={{fontSize:12,fontWeight:700,color:warn?"#ef4444":accent}}>{label}：{text}</span>
    </div>
  );
};
const LVOCard=({label,value,lateral,onToggle})=>{
  const active=lateral?value!==null:value===true;
  let icon="○",sub="";
  if(lateral&&value==="右"){icon="⚡";sub="右";}
  else if(lateral&&value==="左"){icon="⚡";sub="左";}
  else if(!lateral&&value===true){icon="⚡";}
  return(
    <button onClick={onToggle} style={{padding:"12px 6px",borderRadius:12,border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.2s",background:active?"linear-gradient(135deg,#f59e0b,#d97706)":"#0f172a",boxShadow:active?"0 0 14px #f59e0b55":"none",outline:active?"none":"1px solid #1e293b",minHeight:72,width:"100%"}}>
      <span style={{fontSize:18,lineHeight:1}}>{icon}</span>
      <span style={{fontSize:11,fontWeight:700,lineHeight:1.3,textAlign:"center",color:active?"#000":"#475569"}}>{label}</span>
      {sub&&<span style={{fontSize:12,fontWeight:800,color:"#000",background:"#fff4",borderRadius:4,padding:"1px 6px",lineHeight:1.4}}>{sub}</span>}
    </button>
  );
};

// ── Drum Picker ──────────────────────────
function range(start,end,step=1){const arr=[];for(let v=start;v<=end;v=Math.round((v+step)*100)/100)arr.push(v);return arr;}
const PUPIL_SIZE=[1.5,2.0,2.5,3.0,3.5,4.0,4.5,5.0,5.5,6.0,6.5,7.0,8.0];
const BP_SYS=range(60,250,5);
const BP_DIA=range(30,160,5);
const HR_VALS=range(40,120,5);
const SPO2=range(86,100,2).reverse();
const TEMP=range(35.5,39.0,0.5);
const ITEM_H=40, VISIBLE=5;

const DrumPicker=({label,values,selected,onChange})=>{
  const ref=useRef(null);
  const selIdx=selected===""?-1:values.findIndex(v=>String(v)===String(selected));
  const displayIdx=selIdx>=0?selIdx:Math.floor(values.length/2);
  const scrollToIdx=useCallback((idx)=>{if(ref.current)ref.current.scrollTop=idx*ITEM_H;},[]);
  useEffect(()=>{scrollToIdx(displayIdx);},[displayIdx]);
  const onScroll=useCallback(()=>{
    if(!ref.current)return;
    const idx=Math.round(ref.current.scrollTop/ITEM_H);
    const clamped=Math.max(0,Math.min(values.length-1,idx));
    onChange(String(values[clamped]));
  },[values,onChange]);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <div style={{fontSize:10,color:"#64748b",fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",textAlign:"center"}}>{label}</div>
      <div style={{position:"relative",width:72,height:ITEM_H*VISIBLE,overflow:"hidden",borderRadius:10,background:"#0a0f1e"}}>
        <div style={{position:"absolute",top:ITEM_H*Math.floor(VISIBLE/2),left:0,right:0,height:ITEM_H,background:"#1e40af22",borderTop:"1px solid #3b82f655",borderBottom:"1px solid #3b82f655",pointerEvents:"none",zIndex:2}}/>
        <div style={{position:"absolute",top:0,left:0,right:0,height:ITEM_H*1.5,background:"linear-gradient(#0a0f1e,transparent)",pointerEvents:"none",zIndex:3}}/>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:ITEM_H*1.5,background:"linear-gradient(transparent,#0a0f1e)",pointerEvents:"none",zIndex:3}}/>
        <div ref={ref} onScroll={onScroll} style={{height:"100%",overflowY:"scroll",scrollSnapType:"y mandatory",scrollbarWidth:"none",msOverflowStyle:"none",WebkitOverflowScrolling:"touch"}}>
          <div style={{height:ITEM_H*Math.floor(VISIBLE/2)}}/>
          {values.map((v,i)=>{
            const isSel=String(v)===String(selected);
            return(
              <div key={v} onClick={()=>{onChange(String(v));scrollToIdx(i);}} style={{height:ITEM_H,display:"flex",alignItems:"center",justifyContent:"center",scrollSnapAlign:"center",cursor:"pointer",fontSize:isSel?18:14,fontWeight:isSel?800:400,color:isSel?"#93c5fd":"#334155",transition:"all 0.15s"}}>
                {String(v)}
              </div>
            );
          })}
          <div style={{height:ITEM_H*Math.floor(VISIBLE/2)}}/>
        </div>
      </div>
      <div style={{fontSize:12,fontWeight:700,color:selected?"#e2e8f0":"#334155",minHeight:18}}>{selected||"─"}</div>
    </div>
  );
};
const BpPicker=({labelSide,sys,dia,onSys,onDia})=>(
  <div style={{background:"#0f172a",borderRadius:12,padding:"14px 12px",border:"1px solid #1e293b",marginBottom:12}}>
    <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:10,letterSpacing:"0.06em"}}>
      血圧 — {labelSide} (mmHg)
      {sys&&dia&&<span style={{marginLeft:8,color:"#fb7185",fontWeight:800}}>{sys}/{dia}</span>}
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"flex-start"}}>
      <DrumPicker label="収縮期" values={BP_SYS} selected={sys} onChange={onSys}/>
      <div style={{fontSize:24,color:"#475569",paddingTop:ITEM_H*2+24,fontWeight:300}}>/</div>
      <DrumPicker label="拡張期" values={BP_DIA} selected={dia} onChange={onDia}/>
    </div>
  </div>
);

// ── Main App ──────────────────────────────
function App(){
  const [data,setData]=useState(INITIAL);
  const [tab,setTab]=useState(0);
  const [copied,setCopied]=useState(false);
  const now=useNow();
  const set=useCallback((key,val)=>setData(d=>({...d,[key]:val})),[]);
  const toggleLvo=useCallback((key,lateral)=>setData(d=>({...d,lvo:{...d.lvo,[key]:nextLvoVal(d.lvo[key],lateral)}})),[]);
  const lvoScore=calcLvoScore(data.lvo);
  const notification=generateNotification(data,now);
  const copyToClipboard=()=>{
    if(navigator.clipboard){
      navigator.clipboard.writeText(notification).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
    } else {
      // iOS fallback
      const ta=document.createElement("textarea");
      ta.value=notification; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }
  };
  const tabs=["基本情報","LVOスケール","バイタル・既往","搬送情報"];

  const tabContent=[
    // Tab 0
    <div key={0}>
      <Section title="連絡元" accent="#38bdf8">
        <Field label="種別">
          <SegControl value={data.contactType} onChange={v=>set("contactType",v)} options={[["ems","🚑 救急隊"],["hospital","🏥 病院紹介"]]}/>
        </Field>
        {data.contactType==="ems"?(
          <Field label="救急隊（地域）">
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {EMS_UNITS.map(u=>(
                <button key={u} onClick={()=>set("emsUnit",u)} style={{padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,transition:"all 0.15s",background:data.emsUnit===u?"#0ea5e9":"#1e293b",color:data.emsUnit===u?"#fff":"#64748b"}}>{u}</button>
              ))}
            </div>
          </Field>
        ):(
          <Field label="紹介病院名">
            <Input placeholder="例: ○○病院 神経内科" value={data.hospitalName} onChange={e=>set("hospitalName",e.target.value)}/>
          </Field>
        )}
      </Section>
      <Section title="患者基本情報" accent="#a78bfa">
        <Field label="初診 / 再診">
          <SegControl value={data.visitType} onChange={v=>set("visitType",v)} options={[["new","初診"],["return","再診"]]}/>
        </Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="年齢"><Input type="number" placeholder="例: 72" value={data.age} onChange={e=>set("age",e.target.value)}/></Field>
          <Field label="性別"><SegControl value={data.sex} onChange={v=>set("sex",v)} options={[["男性","男性"],["女性","女性"]]}/></Field>
        </div>
        <Field label="主訴"><Input placeholder="例: 突然の右片麻痺・失語" value={data.chiefComplaint} onChange={e=>set("chiefComplaint",e.target.value)}/></Field>
        <Field label="随伴症状">
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            <Toggle label="頭痛" checked={data.sx_headache} onChange={v=>set("sx_headache",v)} color="#f97316"/>
            <Toggle label="嘔気・嘔吐" checked={data.sx_nausea} onChange={v=>set("sx_nausea",v)} color="#f97316"/>
            <Toggle label="痙攣（止痙済）" checked={data.sx_seizure_resolved} onChange={v=>set("sx_seizure_resolved",v)} color="#ef4444"/>
            <Toggle label="痙攣（持続中）" checked={data.sx_seizure_ongoing} onChange={v=>set("sx_seizure_ongoing",v)} color="#dc2626"/>
          </div>
        </Field>
      </Section>
      <Section title="発症時刻" accent="#34d399">
        <Field label="発症パターン">
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[["clear","発症時刻あり"],["sleep","睡眠中発症"],["unknown","発症時刻不明"]].map(([v,l])=>(
              <button key={v} onClick={()=>set("onsetType",v)} style={{padding:"8px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,transition:"all 0.15s",background:data.onsetType===v?"#34d399":"#1e293b",color:data.onsetType===v?"#000":"#64748b"}}>{l}</button>
            ))}
          </div>
        </Field>
        {data.onsetType==="clear"&&(<>
          <Field label="発症時刻"><Input type="datetime-local" value={data.onsetTime} onChange={e=>set("onsetTime",e.target.value)}/></Field>
          <ElapsedBadge label="発症からの経過" from={data.onsetTime} accent="#34d399"/>
        </>)}
        {(data.onsetType==="sleep"||data.onsetType==="unknown")&&(<>
          <Field label="最終健常確認時刻（Last Seen Normal）"><Input type="datetime-local" value={data.lastSeenNormal} onChange={e=>set("lastSeenNormal",e.target.value)}/></Field>
          <ElapsedBadge label="最終健常からの経過" from={data.lastSeenNormal} accent="#f59e0b"/>
          <div style={{marginTop:12}}>
            <Field label="発見時刻"><Input type="datetime-local" value={data.foundTime} onChange={e=>set("foundTime",e.target.value)}/></Field>
          </div>
        </>)}
      </Section>
    </div>,

    // Tab 1
    <div key={1}>
      <Section title="LVOスケール" accent="#f59e0b">
        <div style={{background:"#0f172a",borderRadius:12,padding:"14px 18px",marginBottom:18,border:"1px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:"#64748b",letterSpacing:"0.1em",marginBottom:2}}>LVO SCORE</div>
            <div style={{display:"flex",alignItems:"baseline",gap:4}}>
              <span style={{fontSize:52,fontWeight:800,lineHeight:1,transition:"color 0.3s",color:lvoScore>=4?"#ef4444":lvoScore>=2?"#f59e0b":"#22c55e"}}>{lvoScore}</span>
              <span style={{fontSize:22,color:"#475569",fontWeight:600}}>/6</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{display:"flex",gap:5,marginBottom:8,justifyContent:"flex-end"}}>
              {LVO_ITEMS.map(({key,lateral})=>{
                const active=lateral?data.lvo[key]!==null:data.lvo[key]===true;
                return <div key={key} style={{width:24,height:10,borderRadius:5,background:active?"#f59e0b":"#1e293b",boxShadow:active?"0 0 6px #f59e0b88":"none",transition:"all 0.2s"}}/>;
              })}
            </div>
            <div style={{fontSize:13,fontWeight:700,color:lvoScore>=4?"#ef4444":lvoScore>=2?"#f59e0b":"#22c55e"}}>
              {lvoScore>=4?"🔴 LVO 疑い強":lvoScore>=2?"🟡 LVO 可能性あり":lvoScore>0?"🟢 LVO 疑い低":"─ 未回答"}
            </div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {LVO_ITEMS.map(({key,label,lateral})=>(
            <LVOCard key={key} label={label} value={data.lvo[key]} lateral={lateral} onToggle={()=>toggleLvo(key,lateral)}/>
          ))}
        </div>
        <div style={{marginTop:14,padding:"10px 14px",borderRadius:10,background:"#0f172a",border:"1px solid #1e293b"}}>
          <div style={{fontSize:11,color:"#475569",lineHeight:1.8}}>
            <span style={{color:"#64748b",fontWeight:600}}>操作方法：</span><br/>
            顔面麻痺・上肢麻痺・共同偏視・半側空間無視：タップ → <b style={{color:"#fbbf24"}}>右</b> → タップ → <b style={{color:"#fbbf24"}}>左</b> → タップ → 解除<br/>
            失語・脈不整：タップで陽性 ⇔ 解除
          </div>
        </div>
      </Section>
    </div>,

    // Tab 2
    <div key={2}>
      <Section title="バイタルサイン" accent="#fb7185">
        <BpPicker labelSide="右上肢" sys={data.bpRightSys} dia={data.bpRightDia} onSys={v=>set("bpRightSys",v)} onDia={v=>set("bpRightDia",v)}/>
        {!data.showBpLeft?(
          <button onClick={()=>set("showBpLeft",true)} style={{width:"100%",padding:"10px",marginBottom:12,borderRadius:10,border:"1px dashed #1e293b",background:"transparent",color:"#475569",cursor:"pointer",fontSize:13,fontWeight:600}}>＋ 左上肢の血圧を入力する</button>
        ):(
          <BpPicker labelSide="左上肢" sys={data.bpLeftSys} dia={data.bpLeftDia} onSys={v=>set("bpLeftSys",v)} onDia={v=>set("bpLeftDia",v)}/>
        )}
        {(()=>{
          const rSys=parseInt(data.bpRightSys)||0, lSys=parseInt(data.bpLeftSys)||0, diff=Math.abs(rSys-lSys);
          const reasons=[(rSys>0&&rSys<=110)&&`右収縮期血圧 ${rSys} mmHg（≦110）`,(data.showBpLeft&&lSys>0&&rSys>0&&diff>=20)&&`左右収縮期血圧差 ${diff} mmHg（≧20）`].filter(Boolean);
          if(!reasons.length)return null;
          return(
            <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",borderRadius:10,marginBottom:12,background:"#7f1d1d33",border:"1px solid #ef4444"}}>
              <span style={{fontSize:18,lineHeight:1.2}}>⚠️</span>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:"#ef4444",marginBottom:4}}>大動脈解離の疑い</div>
                <div style={{fontSize:12,color:"#fca5a5",lineHeight:1.6}}>{reasons.map((r,i)=><div key={i}>・{r}</div>)}</div>
                <div style={{fontSize:11,color:"#f87171",marginTop:6}}>※ 通知文にも自動で記載されます</div>
              </div>
            </div>
          );
        })()}
        <div style={{background:"#0f172a",borderRadius:12,padding:"14px 12px",border:"1px solid #1e293b",marginBottom:12}}>
          <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:10,letterSpacing:"0.06em"}}>心拍数 / SpO2 / 体温</div>
          <div style={{display:"flex",gap:4,justifyContent:"space-around",alignItems:"flex-start"}}>
            <DrumPicker label="脈拍(bpm)" values={HR_VALS} selected={data.hr} onChange={v=>set("hr",v)}/>
            <DrumPicker label="SpO2(%)" values={SPO2} selected={data.spo2} onChange={v=>set("spo2",v)}/>
            <DrumPicker label="体温(℃)" values={TEMP} selected={data.temp} onChange={v=>set("temp",v)}/>
          </div>
        </div>
        <Field label="JCS">
          <select value={data.jcs} onChange={e=>set("jcs",e.target.value)} style={{width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"9px 12px",color:data.jcs?"#e2e8f0":"#475569",fontSize:14,outline:"none",appearance:"none"}}>
            {JCS_OPTIONS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        </Field>
        <div style={{background:"#0f172a",borderRadius:12,padding:"14px 12px",border:"1px solid #1e293b",marginBottom:12}}>
          <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:12,letterSpacing:"0.06em"}}>瞳孔</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[["R","右",data.pupilR,data.lrR,"pupilR","lrR"],["L","左",data.pupilL,data.lrL,"pupilL","lrL"]].map(([side,label,size,lr,sizeKey,lrKey])=>(
              <div key={side} style={{background:"#020817",borderRadius:10,padding:"12px 10px",border:`1px solid ${lr===false?"#ef444433":lr===true?"#22c55e33":"#1e293b"}`}}>
                <div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:8,textAlign:"center",letterSpacing:"0.08em"}}>{label}眼</div>
                <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
                  <DrumPicker label="瞳孔径(mm)" values={PUPIL_SIZE} selected={size} onChange={v=>set(sizeKey,v)}/>
                </div>
                <div style={{fontSize:10,color:"#64748b",marginBottom:6,textAlign:"center",fontWeight:600,letterSpacing:"0.06em"}}>対光反射 (LR)</div>
                <div style={{display:"flex",gap:6}}>
                  {[[true,"＋ あり","#22c55e"],[false,"－ なし","#ef4444"]].map(([v,l,col])=>(
                    <button key={String(v)} onClick={()=>set(lrKey,lr===v?null:v)} style={{flex:1,padding:"7px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,transition:"all 0.15s",background:lr===v?col:"#1e293b",color:lr===v?"#fff":"#475569"}}>{l}</button>
                  ))}
                </div>
                {(size||lr!==null)&&(
                  <div style={{marginTop:8,textAlign:"center",fontSize:12,fontWeight:700,color:lr===false?"#ef4444":lr===true?"#22c55e":"#94a3b8"}}>
                    {size||"?"}mm / LR{lr===true?"＋":lr===false?"－":"?"}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </Section>
      <Section title="既往歴" accent="#818cf8">
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
          {[["stroke_hx","脳卒中既往"],["af","AF（心房細動）"],["dm","DM"],["ht","HT"]].map(([k,l])=>(
            <Toggle key={k} label={l} checked={data[k]} onChange={v=>set(k,v)}/>
          ))}
        </div>
        <Field label="抗血栓薬"><Input placeholder="例: ワーファリン、アピキサバン、アスピリン" value={data.antithrombotics} onChange={e=>set("antithrombotics",e.target.value)}/></Field>
        <Field label="その他の内服"><Input placeholder="例: アムロジピン、メトホルミン" value={data.otherMeds} onChange={e=>set("otherMeds",e.target.value)}/></Field>
      </Section>
    </div>,

    // Tab 3
    <div key={3}>
      <Section title="搬送情報" accent="#22d3ee">
        <Field label="病着までの時間（分）">
          <Input type="number" placeholder="例: 20" value={data.arrivalMin} onChange={e=>set("arrivalMin",e.target.value)}/>
          {data.arrivalMin&&(
            <div style={{fontSize:12,color:"#22d3ee",marginTop:6,paddingLeft:4}}>
              → 到着予定：{new Date(now+data.arrivalMin*60000).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})} 頃
            </div>
          )}
        </Field>
        <BinaryBtn label="同乗者の有無" value={data.companion} onChange={v=>set("companion",v)}/>
        {data.companion===true&&(
          <Field label="同乗者の続柄・備考"><Input placeholder="例: 配偶者、長男" value={data.companionNote} onChange={e=>set("companionNote",e.target.value)}/></Field>
        )}
        <Field label="備考・追記">
          <textarea value={data.memo} onChange={e=>set("memo",e.target.value)} placeholder="例: 抗凝固薬の最終服薬時刻、AED使用歴 など"
            style={{width:"100%",minHeight:80,background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontSize:14,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
        </Field>
      </Section>
      <div style={{background:"#0f172a",borderRadius:12,padding:16,border:"1px solid #1e293b"}}>
        <div style={{fontSize:11,color:"#64748b",marginBottom:10,fontWeight:700,letterSpacing:"0.1em"}}>PREVIEW — 通知文</div>
        <pre style={{margin:0,fontSize:12,color:"#94a3b8",lineHeight:1.8,whiteSpace:"pre-wrap",wordBreak:"break-all",fontFamily:"'Courier New',monospace"}}>{notification}</pre>
      </div>
    </div>,
  ];

  return(
    <div style={{minHeight:"100vh",background:"#020817",color:"#e2e8f0",display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:48}}>
      <div style={{width:"100%",maxWidth:600,padding:"20px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:"#ef4444",boxShadow:"0 0 8px #ef4444",animation:"pulse 1.5s infinite"}}/>
            <span style={{fontSize:11,color:"#ef4444",fontWeight:700,letterSpacing:"0.12em"}}>STROKE HOTLINE</span>
          </div>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.02em",marginTop:2}}>救急搬送連絡</div>
        </div>
        <button onClick={()=>{setData(INITIAL);setTab(0);}} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #1e293b",background:"transparent",color:"#64748b",cursor:"pointer",fontSize:12,fontWeight:600}}>リセット</button>
      </div>
      <div style={{width:"100%",maxWidth:600,padding:"16px 20px 0",display:"flex",gap:4}}>
        {tabs.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,transition:"all 0.15s",background:tab===i?"#1e40af":"#0f172a",color:tab===i?"#93c5fd":"#475569",borderBottom:tab===i?"2px solid #3b82f6":"2px solid transparent"}}>{t}</button>
        ))}
      </div>
      <div style={{width:"100%",maxWidth:600,padding:"20px 20px 0"}}>{tabContent[tab]}</div>
      <div style={{width:"100%",maxWidth:600,padding:"12px 20px 0",display:"flex",gap:10}}>
        {tab>0&&(
          <button onClick={()=>setTab(t=>t-1)} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid #1e293b",background:"transparent",color:"#94a3b8",cursor:"pointer",fontSize:14,fontWeight:700}}>← 前へ</button>
        )}
        {tab<tabs.length-1?(
          <button onClick={()=>setTab(t=>t+1)} style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:"#1e40af",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700}}>次へ →</button>
        ):(
          <button onClick={copyToClipboard} style={{flex:2,padding:"14px",borderRadius:10,border:"none",cursor:"pointer",fontSize:15,fontWeight:800,letterSpacing:"0.04em",background:copied?"#16a34a":"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",boxShadow:copied?"0 0 20px #16a34a55":"0 0 20px #ef444455",transition:"all 0.2s"}}>{copied?"✓ コピー完了！":"📋 通知文をコピー"}</button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
